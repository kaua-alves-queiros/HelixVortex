name: Build and Publish Game

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            name: Windows-x64
            artifact-name: HelixVortex-Windows-x64
            output-path: bin/Release/net9.0/win-x64/publish/
            publish-args: -f net9.0 -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false

          - os: ubuntu-latest
            rid: linux-x64
            name: Linux-x64
            artifact-name: HelixVortex-Linux-x64
            output-path: bin/Release/net9.0/linux-x64/publish/
            publish-args: -f net9.0 -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false

          - os: macos-latest
            rid: osx-x64
            name: macOS-Intel-x64
            artifact-name: HelixVortex-macOS-Intel
            output-path: bin/Release/net9.0/osx-x64/publish/
            publish-args: -f net9.0 -r osx-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false

          - os: macos-latest
            rid: osx-arm64
            name: macOS-AppleSilicon-arm64
            artifact-name: HelixVortex-macOS-AppleSilicon
            output-path: bin/Release/net9.0/osx-arm64/publish/
            publish-args: -f net9.0 -r osx-arm64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false

          - os: ubuntu-latest
            rid: android
            name: Android
            artifact-name: HelixVortex-Android
            output-path: bin/Release/net9.0-android/
            publish-args: -f net9.0-android -p:BUILD_ANDROID=true -p:AndroidBuildApplication=true -p:AndroidPackageFormat=apk

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install Android Workload
      if: matrix.rid == 'android'
      run: sudo dotnet workload install android

    - name: Restore NuGet Cache
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install dependencies
      run: dotnet restore

    - name: Publish Build
      run: dotnet publish -c Release ${{ matrix.publish-args }}

    - name: Package Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Compress-Archive -Path ${{ matrix.output-path }}* -DestinationPath ${{ matrix.artifact-name }}.zip

    - name: Package Artifacts (Linux / macOS)
      if: matrix.os != 'windows-latest' && matrix.rid != 'android'
      run: |
        cd ${{ matrix.output-path }}
        zip -r ../../../../../${{ matrix.artifact-name }}.zip .

    - name: Package Artifacts (Android)
      if: matrix.rid == 'android'
      run: |
        mkdir -p android-output
        echo "Searching for APK/AAB files..."
        find . \( -name "*.apk" -o -name "*.aab" \)
        find . \( -name "*.apk" -o -name "*.aab" \) -exec cp {} android-output/ \;
        cd android-output
        zip -r ../${{ matrix.artifact-name }}.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.artifact-name }}.zip
        retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Move artifacts to flat folder
      run: |
        mkdir -p release-assets
        find artifacts -name "*.zip" -exec cp {} release-assets/ \;
        ls -la release-assets/

    - name: Create Release and Upload Assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tag_name="v1.0.${{ github.run_number }}"
        gh release create "$tag_name" \
          release-assets/*.zip \
          --title "Helix Vortex $tag_name" \
          --notes "Automatic release of Helix Vortex built on commit ${{ github.sha }}." \
          --target main
