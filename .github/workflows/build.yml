name: Build and Publish Game

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            name: Windows-x64
            artifact-name: HelixVortex-Windows-x64
            output-path: bin/Release/net9.0/win-x64/publish/

          - os: ubuntu-latest
            rid: linux-x64
            name: Linux-x64
            artifact-name: HelixVortex-Linux-x64
            output-path: bin/Release/net9.0/linux-x64/publish/

          - os: macos-latest
            rid: osx-x64
            name: macOS-Intel-x64
            artifact-name: HelixVortex-macOS-Intel
            output-path: bin/Release/net9.0/osx-x64/publish/

          - os: macos-latest
            rid: osx-arm64
            name: macOS-AppleSilicon-arm64
            artifact-name: HelixVortex-macOS-AppleSilicon
            output-path: bin/Release/net9.0/osx-arm64/publish/

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore NuGet Cache
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install dependencies
      run: dotnet restore

    - name: Publish Build
      run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false

    - name: Package Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Compress-Archive -Path ${{ matrix.output-path }}* -DestinationPath ${{ matrix.artifact-name }}.zip

    - name: Package Artifacts (Linux / macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd ${{ matrix.output-path }}
        zip -r ../../../../../${{ matrix.artifact-name }}.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.artifact-name }}.zip
        retention-days: 7
